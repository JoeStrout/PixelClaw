name: pixelclaw
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pillow
  - numpy
  - scipy
  - scikit-image
  - numba          # required by pymatting → rembg; conda has pre-built binaries
  - pip:
    - raylib
    - configargparse
    - anthropic
    - litellm
    - rembg[cpu]
    - pyobjc-framework-Cocoa; sys_platform == "darwin"
    - kokoro-onnx
    - faster-whisper
    - sounddevice
    - pyxelate @ git+https://github.com/sedthh/pyxelate.git
